<script>
document.addEventListener("DOMContentLoaded", function () {

  let path = window.location.pathname;

  if (path.length > 1 && path.endsWith("/")) {
    path = path.slice(0, -1);
  }

  const leftSidebar = document.querySelector(".tri-layout-left");
  if (!leftSidebar) return;

  function hideDarkModeDropdownItem() {
    const possibleItems = document.querySelectorAll(
      "#header .dropdown-menu li, #header [role='menu'] li, #header .dropdown-menu a, #header [role='menu'] a"
    );

    possibleItems.forEach(function (item) {
      const text = item.textContent.trim().toLowerCase();

      if (text.includes("dark mode")) {
        const row = item.closest("li") || item;
        row.style.display = "none";
      }
    });
  }

  hideDarkModeDropdownItem();

  document.addEventListener("click", function () {
    setTimeout(hideDarkModeDropdownItem, 100);
  });

  function createSidebar(title, items) {
    leftSidebar.innerHTML = "";

    const box = document.createElement("div");
    box.className = "custom-left-nav";

    const heading = document.createElement("h3");
    heading.textContent = title;
    box.appendChild(heading);

    items.forEach(function (item) {
      const link = document.createElement("a");
      link.href = item.href;
      link.textContent = item.text;
      link.className = "custom-left-nav-link";

      if (window.location.pathname === item.href) {
        link.classList.add("active");
      }

      box.appendChild(link);
    });

    leftSidebar.appendChild(box);
  }

  function getCleanCards() {
    const cards = document.querySelectorAll("a.grid-card");
    const items = [];

    cards.forEach(function (card) {
      const titleEl = card.querySelector(".grid-card-content h2, .grid-card-content h3");

      if (titleEl) {
        items.push({
          text: titleEl.textContent.trim(),
          href: card.getAttribute("href")
        });
      }
    });

    return items;
  }

  function createBookNavigation() {
    leftSidebar.innerHTML = "";

    const box = document.createElement("div");
    box.className = "custom-left-nav book-tree-nav";

    const heading = document.createElement("h3");
    heading.textContent = "Book Navigation";
    box.appendChild(heading);

    const bookTitle = document.querySelector("h1")?.textContent.trim() || "Book";

    const bookLink = document.createElement("a");
    bookLink.href = path;
    bookLink.textContent = bookTitle;
    bookLink.className = "custom-left-nav-link book active";
    box.appendChild(bookLink);

    const contentLinks = [];
    const seen = {};

    document.querySelectorAll("main a[href]").forEach(function (link) {
      const href = link.getAttribute("href");
      const text = link.textContent.trim();

      if (!href || !text || seen[href]) return;
      seen[href] = true;

      if (href.includes("/chapter/")) {
        contentLinks.push({
          type: "chapter",
          text: text,
          href: href,
          pages: []
        });
      }

      else if (href.includes("/page/")) {
        if (
          contentLinks.length > 0 &&
          contentLinks[contentLinks.length - 1].type === "chapter"
        ) {
          contentLinks[contentLinks.length - 1].pages.push({
            type: "page",
            text: text,
            href: href
          });
        }
      }
    });

    contentLinks.forEach(function (item) {
      const chapterWrap = document.createElement("div");
      chapterWrap.className = "chapter-group";

      const chapterButton = document.createElement("div");
      chapterButton.className = "custom-left-nav-link chapter-toggle";

      const arrow = document.createElement("span");
      arrow.className = "chapter-arrow";
      arrow.textContent = "›";

      const title = document.createElement("a");
      title.href = item.href;
      title.textContent = item.text;
      title.className = "chapter-title";

      chapterButton.appendChild(arrow);
      chapterButton.appendChild(title);

      const pageList = document.createElement("div");
      pageList.className = "chapter-pages";

      item.pages.forEach(function (page) {
        const pageLink = document.createElement("a");
        pageLink.href = page.href;
        pageLink.textContent = page.text;
        pageLink.className = "custom-left-nav-link page";

        if (
          window.location.pathname ===
          new URL(page.href, window.location.origin).pathname
        ) {
          pageLink.classList.add("active");
          chapterWrap.classList.add("open");
        }

        pageList.appendChild(pageLink);
      });

      chapterButton.addEventListener("click", function (e) {
        if (e.target.tagName.toLowerCase() === "a") return;
        if (item.pages.length === 0) return;

        chapterWrap.classList.toggle("open");
      });

      chapterWrap.appendChild(chapterButton);
      chapterWrap.appendChild(pageList);
      box.appendChild(chapterWrap);
    });

    leftSidebar.appendChild(box);
  }

  if (path === "/" || path === "/shelves") {
    createSidebar("Shelves", getCleanCards());
  }

  else if (path === "/books") {
    createSidebar("Books", getCleanCards());
  }

  else if (path.startsWith("/shelves/")) {
    createSidebar("Books in this Shelf", getCleanCards());
  }

  else if (path.startsWith("/books/")) {
    const parts = path.split("/").filter(Boolean);

    if (parts.length === 2) {
      createBookNavigation();
    }
  }

  function addBackToConsoleButton() {
    if (leftSidebar.querySelector(".back-to-console-wrap")) return;

    const wrap = document.createElement("div");
    wrap.className = "back-to-console-wrap";

    const link = document.createElement("a");
    link.href = "http://localhost:5000/adminui";
    link.className = "back-to-console";
    link.textContent = "← Back to Console";

    wrap.appendChild(link);
    leftSidebar.appendChild(wrap);
  }

  addBackToConsoleButton();

});
</script>
